<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Outstanding Penalty Fines</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/templates/stastic/style.css">
</head>
<body class="bg-slate-50 text-slate-800 p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <a href="/index" class="text-indigo-600 hover:underline text-sm">&larr; Return to Workspace</a>
                <h2 class="text-2xl font-bold mt-1">Fines Penalty Ledger</h2>
            </div>
            <button onclick="openFormModal()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg shadow font-medium text-sm hover:bg-indigo-700">Levy Penalty Fine</button>
        </div>

        <div class="bg-white rounded-xl shadow-xs border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500">Fine Reference ID</th>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500">Associated Member ID</th>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500">Outstanding Fine Balance</th>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500">Processing Status</th>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="fines-table-body" class="divide-y divide-slate-200 text-sm"></tbody>
            </table>
        </div>
    </div>

    <div id="formModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs hidden flex items-center justify-center z-50">
        <div class="bg-white w-full max-w-md rounded-xl shadow-xl p-6">
            <h3 id="modalTitle" class="text-lg font-bold mb-4">Levy Library Fine Record</h3>
            <form id="recordForm" onsubmit="saveRecord(event)" class="space-y-4">
                <div id="idFieldContainer">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Fine System Index Key</label>
                    <input type="number" id="fine_id" class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-indigo-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Target Account Member ID</label>
                    <input type="number" id="member_id" required class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-indigo-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Fine Valuation Amount</label>
                    <input type="number" step="0.01" id="amount" required class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-indigo-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Settlement Paid Status</label>
                    <select id="paid_status" class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-indigo-600">
                        <option value="0">Outstanding / Unpaid</option>
                        <option value="1">Settled / Fully Paid</option>
                    </select>
                </div>
                <div class="pt-2 flex justify-end space-x-2">
                    <button type="button" onclick="closeFormModal()" class="px-4 py-2 border rounded-lg text-sm text-slate-600">Dismiss</button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium">Commit Fine</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let isEditMode = false;

        async function loadFines() {
            const response = await fetch('/api/fines');
            const data = await response.json();
            const tbody = document.getElementById('fines-table-body');
            tbody.innerHTML = '';
            data.forEach(row => {
                const isPaid = row.paid_status == 1 || row.paid_status == true;
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50">
                        <td class="px-6 py-4 font-semibold">#${row.fine_id}</td>
                        <td class="px-6 py-4">Member: #${row.member_id}</td>
                        <td class="px-6 py-4 font-bold text-slate-900">₹${row.amount}</td>
                        <td class="px-6 py-4">
                            <span class="px-2.5 py-1 rounded text-xs font-bold ${isPaid ? 'bg-emerald-50 text-emerald-700' : 'bg-rose-50 text-rose-700'}">
                                ${isPaid ? 'Settled' : 'Unpaid Ledger Balance'}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right space-x-2">
                            <button onclick='editRecord(${JSON.stringify(row).replace(/"/g, '&quot;')})' class="text-indigo-600 hover:underline text-xs font-semibold">Update</button>
                            <button onclick="deleteRecord(${row.fine_id})" class="text-rose-600 hover:underline text-xs font-semibold">Delete</button>
                        </td>
                    </tr>`;
            });
        }

        function openFormModal() {
            isEditMode = false;
            document.getElementById('recordForm').reset();
            document.getElementById('idFieldContainer').classList.add('hidden');
            document.getElementById('modalTitle').innerText = "Levy Library Fine Ledger";
            document.getElementById('formModal').classList.remove('hidden');
        }

        function closeFormModal() { document.getElementById('formModal').classList.add('hidden'); }

        function editRecord(row) {
            isEditMode = true;
            document.getElementById('modalTitle').innerText = "Modify Fine Entry Profile";
            document.getElementById('idFieldContainer').classList.remove('hidden');
            document.getElementById('fine_id').value = row.fine_id;
            document.getElementById('fine_id').disabled = true;
            document.getElementById('member_id').value = row.member_id;
            document.getElementById('amount').value = row.amount;
            document.getElementById('paid_status').value = (row.paid_status == 1 || row.paid_status == true) ? "1" : "0";
            document.getElementById('formModal').classList.remove('hidden');
        }

        async function saveRecord(e) {
            e.preventDefault();
            const payload = {
                member_id: document.getElementById('member_id').value,
                amount: document.getElementById('amount').value,
                paid_status: parseInt(document.getElementById('paid_status').value)
            };
            if (isEditMode) payload.fine_id = document.getElementById('fine_id').value;

            await fetch('/api/fines', {
                method: isEditMode ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            closeFormModal();
            loadFines();
        }

        async function deleteRecord(id) {
            if (confirm("Void this library penalty fine record entirely?")) {
                await fetch(`/api/fines?id=${id}`, { method: 'DELETE' });
                loadFines();
            }
        }
        window.onload = loadFines;
    </script>
</body>
</html>
