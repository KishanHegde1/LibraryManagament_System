<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Members</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/templates/stastic/style.css">
</head>
<body class="bg-slate-50 text-slate-800 p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <a href="/index" class="text-indigo-600 hover:underline text-sm">&larr; Return to Workspace</a>
                <h2 class="text-2xl font-bold mt-1">Members Inventory Ledger</h2>
            </div>
            <button onclick="openFormModal()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg shadow font-medium text-sm hover:bg-indigo-700">Enroll New Member</button>
        </div>

        <div class="bg-white rounded-xl shadow-xs border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500">ID Reference</th>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500">Full Name</th>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500">Phone Connection</th>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500">Enrollment Date</th>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="member-table-body" class="divide-y divide-slate-200 text-sm"></tbody>
            </table>
        </div>
    </div>

    <div id="formModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs hidden flex items-center justify-center z-50">
        <div class="bg-white w-full max-w-md rounded-xl shadow-xl p-6">
            <h3 id="modalTitle" class="text-lg font-bold mb-4">Register Member</h3>
            <form id="recordForm" onsubmit="saveRecord(event)" class="space-y-4">
                <div id="idFieldContainer">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Member system code</label>
                    <input type="number" id="member_id" class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-indigo-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Full Legal Name</label>
                    <input type="text" id="name" required class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-indigo-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Mobile Line Contact</label>
                    <input type="text" id="phone" required class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-indigo-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Membership Date</label>
                    <input type="date" id="membership_date" required class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-indigo-600">
                </div>
                <div class="pt-2 flex justify-end space-x-2">
                    <button type="button" onclick="closeFormModal()" class="px-4 py-2 border rounded-lg text-sm text-slate-600">Dismiss</button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium">Commit Payload</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let isEditMode = false;

        async function loadMembers() {
            const response = await fetch('/api/members');
            const data = await response.json();
            const tbody = document.getElementById('member-table-body');
            tbody.innerHTML = '';
            data.forEach(row => {
                let mDate = row.membership_date ? new Date(row.membership_date).toISOString().split('T')[0] : '';
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50">
                        <td class="px-6 py-4 font-semibold">#${row.member_id}</td>
                        <td class="px-6 py-4 font-medium">${row.name}</td>
                        <td class="px-6 py-4">${row.phone}</td>
                        <td class="px-6 py-4">${mDate}</td>
                        <td class="px-6 py-4 text-right space-x-2">
                            <button onclick="editRecord(${JSON.stringify(row).replace(/"/g, '&quot;')})" class="text-indigo-600 hover:underline text-xs font-semibold">Update</button>
                            <button onclick="deleteRecord(${row.member_id})" class="text-rose-600 hover:underline text-xs font-semibold">Delete</button>
                        </td>
                    </tr>`;
            });
        }

        function openFormModal() {
            isEditMode = false;
            document.getElementById('recordForm').reset();
            document.getElementById('idFieldContainer').classList.add('hidden');
            document.getElementById('member_id').required = false;
            document.getElementById('modalTitle').innerText = "Enroll New Member Profile";
            document.getElementById('formModal').classList.remove('hidden');
        }

        function closeFormModal() { document.getElementById('formModal').classList.add('hidden'); }

        function editRecord(row) {
            isEditMode = true;
            document.getElementById('modalTitle').innerText = "Update Member Information";
            document.getElementById('idFieldContainer').classList.remove('hidden');
            document.getElementById('member_id').value = row.member_id;
            document.getElementById('member_id').disabled = true;
            document.getElementById('name').value = row.name;
            document.getElementById('phone').value = row.phone;
            if(row.membership_date) {
                document.getElementById('membership_date').value = new Date(row.membership_date).toISOString().split('T')[0];
            }
            document.getElementById('formModal').classList.remove('hidden');
        }

        async function saveRecord(e) {
            e.preventDefault();
            const payload = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                membership_date: document.getElementById('membership_date').value
            };
            if (isEditMode) payload.member_id = document.getElementById('member_id').value;

            await fetch('/api/members', {
                method: isEditMode ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            closeFormModal();
            loadMembers();
        }

        async function deleteRecord(id) {
            if (confirm("Delete this member execution profile permanently?")) {
                await fetch(`/api/members?id=${id}`, { method: 'DELETE' });
                loadMembers();
            }
        }
        window.onload = loadMembers;
    </script>
</body>
</html>
