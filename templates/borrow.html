<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Circulation Issue Logs</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/templates/stastic/style.css">
</head>
<body class="bg-slate-50 text-slate-800 p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <a href="/index" class="text-indigo-600 hover:underline text-sm">&larr; Return to Workspace</a>
                <h2 class="text-2xl font-bold mt-1">Circulation Circulation Logs</h2>
            </div>
            <button onclick="openFormModal()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg shadow font-medium text-sm hover:bg-indigo-700">Dispatch Book Asset</button>
        </div>

        <div class="bg-white rounded-xl shadow-xs border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500">Issue ID Code</th>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500">Member Reference</th>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500">Book Reference</th>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500">Issue Date</th>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500">Expected Handover Date</th>
                        <th class="px-6 py-3.5 text-xs font-semibold uppercase text-slate-500 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="borrow-table-body" class="divide-y divide-slate-200 text-sm"></tbody>
            </table>
        </div>
    </div>

    <div id="formModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs hidden flex items-center justify-center z-50">
        <div class="bg-white w-full max-w-md rounded-xl shadow-xl p-6">
            <h3 id="modalTitle" class="text-lg font-bold mb-4">Log Active Book Dispatch</h3>
            <form id="recordForm" onsubmit="saveRecord(event)" class="space-y-4">
                <div id="idFieldContainer">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Issue System Index</label>
                    <input type="number" id="issue_id" class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-indigo-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Borrower Member ID</label>
                    <input type="number" id="member_id" required class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-indigo-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Target Book ID</label>
                    <input type="number" id="book_id" required class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-indigo-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Date of Issue</label>
                    <input type="date" id="issue_date" required class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-indigo-600">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Return Expiration Date</label>
                    <input type="date" id="return_date" required class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-indigo-600">
                </div>
                <div class="pt-2 flex justify-end space-x-2">
                    <button type="button" onclick="closeFormModal()" class="px-4 py-2 border rounded-lg text-sm text-slate-600">Dismiss</button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium">Commit Dispatch</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let isEditMode = false;

        async function loadBorrows() {
            const response = await fetch('/api/borrowings');
            const data = await response.json();
            const tbody = document.getElementById('borrow-table-body');
            tbody.innerHTML = '';
            data.forEach(row => {
                let iDate = row.issue_date ? new Date(row.issue_date).toISOString().split('T')[0] : '';
                let rDate = row.return_date ? new Date(row.return_date).toISOString().split('T')[0] : '';
                
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50">
                        <td class="px-6 py-4 font-semibold">#${row.issue_id}</td>
                        <td class="px-6 py-4 text-slate-600">Member ID: #${row.member_id}</td>
                        <td class="px-6 py-4 text-slate-600">Book ID: #${row.book_id}</td>
                        <td class="px-6 py-4 font-medium">${iDate}</td>
                        <td class="px-6 py-4 font-medium text-amber-700">${rDate}</td>
                        <td class="px-6 py-4 text-right space-x-2">
                            <button onclick='editRecord({"issue_id":${row.issue_id},"member_id":${row.member_id},"book_id":${row.book_id},"issue_date":"${iDate}","return_date":"${rDate}"})' class="text-indigo-600 hover:underline text-xs font-semibold">Update</button>
                            <button onclick="deleteRecord(${row.issue_id})" class="text-rose-600 hover:underline text-xs font-semibold">Delete</button>
                        </td>
                    </tr>`;
            });
        }

        function openFormModal() {
            isEditMode = false;
            document.getElementById('recordForm').reset();
            document.getElementById('idFieldContainer').classList.add('hidden');
            document.getElementById('modalTitle').innerText = "Log Asset Circulation Dispatch";
            document.getElementById('formModal').classList.remove('hidden');
        }

        function closeFormModal() { document.getElementById('formModal').classList.add('hidden'); }

        function editRecord(row) {
            isEditMode = true;
            document.getElementById('modalTitle').innerText = "Modify Active Circulation Record";
            document.getElementById('idFieldContainer').classList.remove('hidden');
            document.getElementById('issue_id').value = row.issue_id;
            document.getElementById('issue_id').disabled = true;
            document.getElementById('member_id').value = row.member_id;
            document.getElementById('book_id').value = row.book_id;
            document.getElementById('issue_date').value = row.issue_date;
            document.getElementById('return_date').value = row.return_date;
            document.getElementById('formModal').classList.remove('hidden');
        }

        async function saveRecord(e) {
            e.preventDefault();
            const payload = {
                member_id: document.getElementById('member_id').value,
                book_id: document.getElementById('book_id').value,
                issue_date: document.getElementById('issue_date').value,
                return_date: document.getElementById('return_date').value
            };
            if (isEditMode) payload.issue_id = document.getElementById('issue_id').value;

            await fetch('/api/borrowings', {
                method: isEditMode ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            closeFormModal();
            loadBorrows();
        }

        async function deleteRecord(id) {
            if (confirm("Delete the target issue logging transaction?")) {
                await fetch(`/api/borrowings?id=${id}`, { method: 'DELETE' });
                loadBorrows();
            }
        }
        window.onload = loadBorrows;
    </script>
</body>
</html>
